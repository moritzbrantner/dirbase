name: rust-package-publish

on:
  push:
    tags:
      - 'bun-v*'
  workflow_dispatch:

jobs:
  build-binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform_key: linux-x64
          - os: macos-13
            platform_key: darwin-x64
          - os: macos-latest
            platform_key: darwin-arm64
          - os: windows-latest
            platform_key: win32-x64
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: js
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: '.bun-version'

      - name: Install UI dependencies
        run: bun install --cwd ../ui --frozen-lockfile

      - name: Build Rust binary
        run: cargo build --release --manifest-path ../Cargo.toml

      - name: Copy platform binary
        run: bun scripts/copy-rust-binary.mjs
        env:
          TARGET_PLATFORM_KEY: ${{ matrix.platform_key }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: dirbase-${{ matrix.platform_key }}
          path: js/bin/${{ matrix.platform_key }}

  publish:
    needs: build-binaries
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: js
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: '.bun-version'

      - name: Install Bun dependencies
        run: bun install --frozen-lockfile

      - name: Build JavaScript bundle
        run: bun run build:js

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: js/bin
          pattern: dirbase-*
          merge-multiple: true

      - name: Publish package
        run: bun publish --access public
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
