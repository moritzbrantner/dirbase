name: Rust Clippy

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  rust-clippy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup project
        uses: ./.github/actions/setup-project
        with:
          rust-components: clippy

      - name: Lint
        run: cargo clippy --all-targets --all-features -- -D warnings
