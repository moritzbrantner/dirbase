name: Rust Format Check

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  rust-fmt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup project
        uses: ./.github/actions/setup-project
        with:
          rust-components: rustfmt
          bun: "false"
          ui-deps: "false"

      - name: Check formatting
        run: cargo fmt --all -- --check
